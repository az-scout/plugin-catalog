name: Review Plugins

on:
  schedule:
    - cron: "0 8 1 * *"  # 1st of each month at 08:00 UTC
  workflow_dispatch:
    inputs:
      plugin:
        description: "Review a single plugin (package name). Leave empty for all."
        required: false
        type: string
      dry_run:
        description: "Dry-run mode — print what would happen without creating issues"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------
  # Job 1: Discover which plugins to review → outputs a JSON matrix
  # ---------------------------------------------------------------
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
      count: ${{ steps.discover.outputs.count }}
    steps:
      - uses: actions/checkout@v4

      - name: Discover auditable plugins
        id: discover
        run: |
          PLUGINS=$(python3 -c "
          import json, sys
          catalog = json.load(open('catalog.json'))
          target = '${{ inputs.plugin }}'.strip()
          result = []
          for p in catalog:
              if target and p['name'] != target:
                  continue
              if 'audit' in p:
                  if not p['audit']:
                      continue
              else:
                  if '/az-scout/' not in p.get('repository', ''):
                      continue
              # Extract owner/repo from repository URL
              repo_path = p['repository'].replace('https://github.com/', '').rstrip('/')
              result.append({
                  'name': p['name'],
                  'repo': repo_path,
              })
          print(json.dumps(result))
          ")
          COUNT=$(echo "$PLUGINS" | python3 -c "import json,sys; print(len(json.load(sys.stdin)))")
          echo "matrix={\"include\":$PLUGINS}" >> "$GITHUB_OUTPUT"
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "Found $COUNT plugin(s) to review"

  # ---------------------------------------------------------------
  # Job 2: One job per plugin — create issue + assign Copilot
  # ---------------------------------------------------------------
  review:
    needs: discover
    if: needs.discover.outputs.count != '0'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    name: "review (${{ matrix.name }})"
    env:
      GH_TOKEN: ${{ secrets.AUDIT_PAT }}
      REVIEW_LABEL: "az-scout-review"
    steps:
      - uses: actions/checkout@v4

      - name: Build review prompt body
        id: prompt
        run: |
          PROMPT=$(sed '1{/^---$/!q}; 1,/^---$/d' .github/prompts/review-plugin.prompt.md)
          {
            echo "REVIEW_PROMPT<<PROMPT_EOF"
            echo "$PROMPT"
            echo "PROMPT_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Ensure review label exists
        run: |
          gh label create "$REVIEW_LABEL" \
            --repo "${{ matrix.repo }}" \
            --color "1d76db" \
            --description "Automated plugin convention review from plugin-catalog" \
            --force 2>/dev/null || true

      - name: Check for existing review issue
        id: check
        run: |
          # Search by label first, then by title as fallback
          EXISTING=$(gh issue list \
            --repo "${{ matrix.repo }}" \
            --label "$REVIEW_LABEL" \
            --state open \
            --json number \
            --jq '.[0].number // empty' 2>/dev/null || true)
          if [ -z "$EXISTING" ]; then
            EXISTING=$(gh issue list \
              --repo "${{ matrix.repo }}" \
              --search "in:title [plugin review]" \
              --state open \
              --json number \
              --jq '.[0].number // empty' 2>/dev/null || true)
          fi
          echo "existing=$EXISTING" >> "$GITHUB_OUTPUT"
          if [ -n "$EXISTING" ]; then
            echo "ℹ Review issue #$EXISTING already open — skipping"
          fi

      - name: Create review issue
        if: steps.check.outputs.existing == '' && inputs.dry_run != true
        id: create
        env:
          REVIEW_PROMPT: ${{ steps.prompt.outputs.REVIEW_PROMPT }}
        run: |
          set -euo pipefail

          ISSUE_BODY="## Copilot Review Request: ${{ matrix.name }}

          This is an automated review request from the [plugin-catalog](https://github.com/az-scout/plugin-catalog).

          ### Task

          Review this plugin for compliance with az-scout conventions using the checklist below.
          Read the source code in this repository and:

          1. **Post your findings as a comment on this issue** using the report format from section 9.
          2. If you open a PR to fix any issues, **link it to this issue** using \`Closes #<this-issue-number>\` in the PR description.

          **Instructions:**
          - Skip section 1 (source gathering — you have access to this repo) and section 8 (running lint — not applicable here).
          - Focus on sections 2–7 and produce the report as described in section 9.
          - Only include sections with actual findings. Omit empty sections.
          - If everything passes, say 'All checks passed.'

          ---

          $REVIEW_PROMPT

          ---
          _This issue was automatically created by the [plugin-catalog review workflow](https://github.com/az-scout/plugin-catalog/actions/workflows/audit.yml)._"

          ISSUE_URL=$(gh issue create \
            --repo "${{ matrix.repo }}" \
            --title "[plugin review] Convention compliance review" \
            --body "$ISSUE_BODY")

          ISSUE_NUMBER=$(echo "$ISSUE_URL" | grep -oE '[0-9]+$')
          echo "url=$ISSUE_URL" >> "$GITHUB_OUTPUT"
          echo "number=$ISSUE_NUMBER" >> "$GITHUB_OUTPUT"
          echo "🆕 Created: $ISSUE_URL"

      - name: Assign Copilot
        if: steps.create.outputs.number != ''
        run: |
          # Add the review label
          gh issue edit "${{ steps.create.outputs.number }}" \
            --repo "${{ matrix.repo }}" \
            --add-label "$REVIEW_LABEL" 2>/dev/null || true

          # Wait for issue to be fully indexed before assigning Copilot
          sleep 10

          # Assign Copilot
          if gh issue edit "${{ steps.create.outputs.number }}" \
            --repo "${{ matrix.repo }}" \
            --add-assignee "@copilot" 2>/dev/null; then
            echo "🤖 Assigned Copilot to issue #${{ steps.create.outputs.number }}"
          else
            echo "::warning::Could not auto-assign Copilot — assign manually at ${{ steps.create.outputs.url }}"
          fi

      - name: Dry-run summary
        if: inputs.dry_run == true && steps.check.outputs.existing == ''
        run: echo "🏷️ Would create review issue on ${{ matrix.repo }} (dry-run)"

      - name: Job summary
        if: always()
        run: |
          {
            echo "### 🔍 Review: \`${{ matrix.name }}\`"
            echo ""
            echo "| Item | Value |"
            echo "|------|-------|"
            echo "| **Repository** | [${{ matrix.repo }}](https://github.com/${{ matrix.repo }}) |"

            if [ -n "${{ steps.check.outputs.existing }}" ]; then
              echo "| **Status** | ⏭️ Skipped — existing issue open |"
              echo "| **Issue** | [#${{ steps.check.outputs.existing }}](https://github.com/${{ matrix.repo }}/issues/${{ steps.check.outputs.existing }}) |"
            elif [ "${{ inputs.dry_run }}" = "true" ]; then
              echo "| **Status** | 🏷️ Dry-run — no issue created |"
            elif [ -n "${{ steps.create.outputs.number }}" ]; then
              echo "| **Status** | ✅ Issue created |"
              echo "| **Issue** | [#${{ steps.create.outputs.number }}](${{ steps.create.outputs.url }}) |"
            else
              echo "| **Status** | ❌ Failed to create issue |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
